name: ARIA Entry Point Scanner

# ── 실행 스케줄 ──────────────────────────────────────────────────
# 한국장  KST 09:00~15:30 = UTC 00:00~06:30
# 미국장  EST 09:30~16:00 = UTC 14:30~21:00 = KST 23:30~06:00(+1)
#
# 매시 정각 30분에 실행 (장 열린 직후 + 정각 이후 데이터 안정화)
on:
  schedule:
    # ── 한국장 시간대 (UTC 00:30 ~ 06:00, 월~금) ─────────────────
    - cron: "30 0 * * 1-5"    # KST 09:30
    - cron: "30 1 * * 1-5"    # KST 10:30
    - cron: "30 2 * * 1-5"    # KST 11:30
    - cron: "30 3 * * 1-5"    # KST 12:30
    - cron: "30 4 * * 1-5"    # KST 13:30
    - cron: "30 5 * * 1-5"    # KST 14:30
    - cron: "0  6 * * 1-5"    # KST 15:00 (마감 30분 전)

    # ── 미국장 시간대 (UTC 14:30 ~ 21:00) ────────────────────────
    # 월~목: UTC 14:30 = 일~수 KST 23:30 (전날 깊은밤)
    - cron: "30 14 * * 1-5"   # KST 23:30 (미국장 개장)
    - cron: "30 15 * * 2-6"   # KST 00:30
    - cron: "30 16 * * 2-6"   # KST 01:30
    - cron: "30 17 * * 2-6"   # KST 02:30
    - cron: "30 18 * * 2-6"   # KST 03:30
    - cron: "30 19 * * 2-6"   # KST 04:30
    - cron: "0  21 * * 2-6"   # KST 06:00 (마감 전 마지막)

  workflow_dispatch:
    inputs:
      force_scan:
        description: "장 마감 시간에도 강제 스캔 (true/false)"
        required: false
        default: "false"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install httpx yfinance

      - name: Run ARIA Scanner
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_SCAN:        ${{ github.event.inputs.force_scan }}
        run: python aria_scanner.py

      - name: Save scanner state
        run: |
          git config user.name  "ARIA Scanner"
          git config user.email "scanner@aria-agent"
          git add data/scanner_log.json data/scanner_cooldown.json || true
          git diff --cached --quiet || \
            git commit -m "📡 Scanner: $(date +'%Y-%m-%d %H:%M UTC') 스캔"
          git push || (git pull --rebase origin main && git push)
