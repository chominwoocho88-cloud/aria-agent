name: Jackal Hunter

# Jackal 전용 워크플로우 — ARIA와 완전 독립
# 역할: 매시간 ARIA 뉴스 기반 스윙 종목 탐색 + 텔레그램 알림 + 자체 학습
# 포트폴리오 모니터링 X — 항상 새 종목만 발굴
# 포트폴리오 분석은 ARIA daily가 담당

# [Bug Fix] 동시 실행 방지: 이전 실행이 끝나지 않아도 새 실행은 대기 후 순차 처리.
# cancel-in-progress: false — 진행 중인 Hunt를 강제 취소하지 않음 (데이터 손상 방지)
concurrency:
  group: jackal-hunt
  cancel-in-progress: false
on:
  schedule:
    # 한국장 (UTC 00:30~06:00, 월~금)
    - cron: "30 0 * * 1-5"    # KST 09:30
    - cron: "30 1 * * 1-5"    # KST 10:30
    - cron: "30 2 * * 1-5"    # KST 11:30
    - cron: "30 3 * * 1-5"    # KST 12:30
    - cron: "30 4 * * 1-5"    # KST 13:30
    - cron: "30 5 * * 1-5"    # KST 14:30
    - cron: "0  6 * * 1-5"    # KST 15:00
    # 미국장 (UTC 14:30~21:00)
    - cron: "30 14 * * 1-5"   # KST 23:30
    - cron: "30 15 * * 2-6"   # KST 00:30
    - cron: "30 16 * * 2-6"   # KST 01:30
    - cron: "30 17 * * 2-6"   # KST 02:30
    - cron: "30 18 * * 2-6"   # KST 03:30
    - cron: "30 19 * * 2-6"   # KST 04:30
    - cron: "0  21 * * 2-6"   # KST 06:00

  workflow_dispatch:
    inputs:
      force_hunt:
        description: "장 마감 무시 강제 실행 (true 입력 시 지금 당장 ARIA 기반 스윙 종목 탐색)"
        required: false
        default: "false"
      force_evolve:
        description: "Evolution 강제 실행 (true 입력 시 24h 미경과해도 학습 즉시 실행)"
        required: false
        default: "false"

jobs:
  jackal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic httpx yfinance

      - name: Run Jackal
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          JACKAL_DAILY_BUDGET: "500000"
          JACKAL_AUTOCOMPACT:  "true"
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY:         ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY:          ${{ secrets.FSCAPI_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_hunt }}"   = "true" ] && ARGS="$ARGS --force-hunt"
          [ "${{ github.event.inputs.force_evolve }}" = "true" ] && ARGS="$ARGS --force-evolve"
          python jackal/jackal_core.py $ARGS

      - name: Save Jackal state
        run: |
          git config user.name  "Jackal Bot"
          git config user.email "jackal@aria-agent"

          git add jackal/hunt_log.json          2>/dev/null || true
          git add jackal/hunt_cooldown.json     2>/dev/null || true
          git add jackal/jackal_weights.json    2>/dev/null || true
          git add jackal/skills/                2>/dev/null || true
          git add jackal/lessons/               2>/dev/null || true
          git add jackal/compact_log.json       2>/dev/null || true
          git add jackal/.last_evolve           2>/dev/null || true
          git add data/jackal_watchlist.json    2>/dev/null || true
          git add data/jackal_news.json         2>/dev/null || true

          git diff --cached --quiet && exit 0

          git commit -m "🦊 Jackal: $(date +'%Y-%m-%d %H:%M') [skip ci]"

          git push || {
            git pull --rebase origin main || git rebase --abort
            git push
          }
