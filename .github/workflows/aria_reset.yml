name: ARIA Reset

# 학습 데이터 수동 초기화 워크플로우
# ⚠️  실행 전 반드시 confirm 필드에 'RESET' 입력
# 초기화 후 자동으로 aria_backtest.yml 실행 권장 (--months 6)

on:
  workflow_dispatch:
    inputs:
      reset_aria:
        description: "ARIA 초기화 (accuracy / memory / lessons / weights / sentiment / rotation)"
        required: false
        default: "true"
        type: boolean
      reset_jackal:
        description: "Jackal 초기화 (hunt_log / weights / skills / lessons)"
        required: false
        default: "false"
        type: boolean
      confirm:
        description: "⚠️ 확인 문자 — 정확히 'RESET' 입력 시에만 실행됩니다"
        required: true
        default: ""

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 확인 문자 검증 ─────────────────────────────────────────────────
      - name: Validate confirm
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "RESET" ]; then
            echo "❌ 확인 문자가 'RESET'이 아닙니다. 중단합니다."
            echo "   입력값: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "✅ 확인 문자 검증 통과"

      # ── 초기화 실행 ────────────────────────────────────────────────────
      - name: Reset ARIA data
        if: github.event.inputs.reset_aria == 'true'
        env:
          PYTHONIOENCODING: utf-8
        run: python aria_reset.py --aria

      - name: Reset Jackal data
        if: github.event.inputs.reset_jackal == 'true'
        env:
          PYTHONIOENCODING: utf-8
        run: python aria_reset.py --jackal

      # ── 초기화 결과 검증 ───────────────────────────────────────────────
      - name: Verify reset
        run: |
          echo "=== 초기화 결과 검증 ==="
          if [ "${{ github.event.inputs.reset_aria }}" = "true" ]; then
            python3 -c "
          import json
          from pathlib import Path
          acc = json.loads(Path('data/accuracy.json').read_text())
          mem = json.loads(Path('data/memory.json').read_text())
          print(f'  accuracy.json: total={acc[\"total\"]}, correct={acc[\"correct\"]} ✅')
          print(f'  memory.json: {len(mem)}건 ✅')
          "
          fi
          if [ "${{ github.event.inputs.reset_jackal }}" = "true" ]; then
            python3 -c "
          import json
          from pathlib import Path
          hl = json.loads(Path('jackal/hunt_log.json').read_text())
          print(f'  hunt_log.json: {len(hl)}건 ✅')
          "
          fi

      # ── Git 커밋 & Push ────────────────────────────────────────────────
      - name: Commit reset
        run: |
          git config user.name  "ARIA Reset"
          git config user.email "reset@aria-agent"

          # ARIA 파일 스테이징
          git add data/accuracy.json      2>/dev/null || true
          git add data/memory.json        2>/dev/null || true
          git add data/aria_lessons.json  2>/dev/null || true
          git add data/aria_weights.json  2>/dev/null || true
          git add data/sentiment.json     2>/dev/null || true
          git add data/rotation.json      2>/dev/null || true
          git add data/pattern_db.json    2>/dev/null || true

          # Jackal 파일 스테이징
          git add jackal/hunt_log.json        2>/dev/null || true
          git add jackal/hunt_cooldown.json   2>/dev/null || true
          git add jackal/jackal_weights.json  2>/dev/null || true
          git add jackal/skills/              2>/dev/null || true
          git add jackal/lessons/             2>/dev/null || true
          git add jackal/jackal_usage_log.json 2>/dev/null || true

          # .bak 파일은 .gitignore 처리 권장 — 스테이징 제외
          git reset HEAD -- "*.bak" 2>/dev/null || true

          git diff --cached --quiet && echo "변경 없음 — 이미 초기화 상태" && exit 0

          ARIA_FLAG="${{ github.event.inputs.reset_aria == 'true' && 'ARIA' || '' }}"
          JACKAL_FLAG="${{ github.event.inputs.reset_jackal == 'true' && 'Jackal' || '' }}"

          git commit -m "🔄 Reset: ${ARIA_FLAG} ${JACKAL_FLAG} 초기화 ($(date +'%Y-%m-%d %H:%M'))"

          git push || {
            git pull --rebase origin main || git rebase --abort
            git push
          }

          echo ""
          echo "✅ 초기화 완료 & push 성공"
          echo ""
          echo "📌 다음 단계 권장:"
          echo "   1. Actions → ARIA Backtest 실행 (--months 6 자동 적용)"
          echo "   2. 백테스트 완료 후 ARIA Daily 재개"
