name: Apply All Bug Fixes

on:
  workflow_dispatch:

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply fixes
        run: python apply_bugfixes.py

      - name: Verify fixes
        run: python verify_bugs_inline.py

      - name: Commit
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"
          git add aria_paths.py aria_analysis.py aria_agents.py aria_main.py aria_backtest.py
          git add jackal/jackal_evolution.py jackal/jackal_core.py jackal/aria_adapter.py jackal/jackal_hunter.py
          git diff --cached --quiet || git commit -m "Fix: 전체 버그 수정 (Bug1-15) [skip ci]"
          git push
