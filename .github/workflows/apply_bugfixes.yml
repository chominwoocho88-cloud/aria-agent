name: Apply All Bug Fixes

on:
  workflow_dispatch:

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply all bug fixes
        run: |
          python - << 'PYEOF'
          import re
          from pathlib import Path

          def patch(path, old, new, label):
              f = Path(path)
              if not f.exists():
                  print(f"  ⚠️  {label}: 파일 없음 ({path})")
                  return False
              src = f.read_text(encoding="utf-8")
              if old not in src:
                  print(f"  ⏭  {label}: 이미 적용됨 (패턴 없음)")
                  return False
              f.write_text(src.replace(old, new, 1), encoding="utf-8")
              print(f"  ✅ {label}")
              return True

          print("\n" + "="*60)
          print("  Bug Fix 적용 시작")
          print("="*60 + "\n")

          # ────────────────────────────────────────────────────────
          # Bug 1-A: jackal_evolution.py — signal_weights 중복 키
          # ────────────────────────────────────────────────────────
          patch(
              "jackal/jackal_evolution.py",
              '''"signal_weights": {
        "rsi_oversold":   1.0,
        "bb_touch":       1.0,
        "volume_surge":   1.0,
        "volume_climax":  1.0,
        "ma_support":     1.0,
        "bullish_div":    1.0,
        "sector_inflow":  1.0,
        "golden_cross":   1.0,
        "fear_regime":    1.0,
        "sector_inflow":  1.0,
    },''',
              '''"signal_weights": {
        "bb_touch":         1.0,
        "rsi_oversold":     1.0,
        "volume_climax":    1.0,
        "ma_support":       1.0,
        "momentum_dip":     1.0,
        "vol_accumulation": 1.0,
        "sector_rebound":   1.0,
        "rsi_divergence":   1.0,
        "sector_inflow":    1.0,
        "golden_cross":     1.0,
        "fear_regime":      1.0,
        "bullish_div":      1.0,
        "volume_surge":     1.0,
    },''',
              "Bug1-A: signal_weights 중복 키 제거 + 실운용 키 동기화"
          )

          # ────────────────────────────────────────────────────────
          # Bug 1-B: jackal_evolution.py — 잘못된 모델명
          # ────────────────────────────────────────────────────────
          patch(
              "jackal/jackal_evolution.py",
              'MODEL_S = os.environ.get("ANTHROPIC_MODEL", "claude-sonnet-4-20250514")',
              'MODEL_S = os.environ.get("ANTHROPIC_MODEL", os.environ.get("SUBAGENT_MODEL", "claude-sonnet-4-6"))',
              "Bug1-B: 잘못된 모델명 수정"
          )

          # ────────────────────────────────────────────────────────
          # Bug 3/8: jackal_evolution.py — _mark_last_evolve
          # ────────────────────────────────────────────────────────
          patch(
              "jackal/jackal_evolution.py",
              '    def _mark_last_evolve(self):\n        (_BASE / ".last_evolve").write_text(datetime.now().isoformat(), encoding="utf-8")',
              '    def _mark_last_evolve(self):\n        """last_evolved_at을 weights에 기록 — .last_evolve 파일 의존 제거"""\n        self.weights["last_evolved_at"] = datetime.now().isoformat()',
              "Bug3/8: _mark_last_evolve → weights 기반"
          )

          # ────────────────────────────────────────────────────────
          # Bug 3: jackal_core.py — import json + _should_evolve
          # ────────────────────────────────────────────────────────
          patch(
              "jackal/jackal_core.py",
              "import os\nimport sys\nimport logging\nimport argparse",
              "import os\nimport sys\nimport json\nimport logging\nimport argparse",
              "Bug3: import json 추가"
          )

          patch(
              "jackal/jackal_core.py",
              '''    def _should_evolve(self) -> bool:
        marker = _BASE / ".last_evolve"
        if not marker.exists():
            return True
        try:
            last    = datetime.fromisoformat(marker.read_text().strip())
            elapsed = (datetime.now() - last).total_seconds() / 3600
            return elapsed >= 24
        except Exception:
            return True''',
              '''    def _should_evolve(self) -> bool:
        """jackal_weights.json["last_evolved_at"] 기반 — .last_evolve 파일 제거"""
        weights_file = _BASE / "jackal_weights.json"
        if not weights_file.exists():
            log.info("🧬 Evolution: weights 없음 → 실행")
            return True
        try:
            weights  = json.loads(weights_file.read_text(encoding="utf-8"))
            last_str = weights.get("last_evolved_at", "")
            if not last_str:
                return True
            last    = datetime.fromisoformat(last_str)
            elapsed = (datetime.now() - last).total_seconds() / 3600
            should  = elapsed >= 24
            log.info(f"🧬 Evolution: 마지막 {elapsed:.1f}h 전 → {'실행' if should else f'스킵 ({24-elapsed:.1f}h 남음)'}")
            return should
        except Exception as e:
            log.warning(f"🧬 Evolution 체크 오류: {e} → 실행")
            return True''',
              "Bug3: _should_evolve → weights 기반"
          )

          # ────────────────────────────────────────────────────────
          # Bug 4: aria_adapter.py — 경로 분기 로직
          # ────────────────────────────────────────────────────────
          patch(
              "jackal/aria_adapter.py",
              '''_BASE         = Path(__file__).parent
_ROOT         = _BASE.parent if (_BASE / "jackal_hunter.py").exists() else _BASE
DATA_DIR      = _ROOT / "data"''',
              '''_JACKAL_DIR = Path(__file__).parent
_REPO_ROOT  = _JACKAL_DIR.parent
DATA_DIR    = _REPO_ROOT / "data"''',
              "Bug4: aria_adapter 경로 분기 제거"
          )

          # ────────────────────────────────────────────────────────
          # Bug 5: jackal_hunter.py — aria_adapter 사용
          # ────────────────────────────────────────────────────────
          patch(
              "jackal/jackal_hunter.py",
              'ARIA_BASELINE  = Path("data") / "morning_baseline.json"\nARIA_MEMORY    = Path("data") / "memory.json"',
              '''# [Bug Fix 5] ARIA 경로 직접 참조 제거 → aria_adapter 사용
from aria_adapter import (
    load_aria_context     as _load_aria_context,
    aria_baseline_exists  as _aria_baseline_exists,
)''',
              "Bug5: ARIA 하드코딩 경로 → aria_adapter"
          )

          patch(
              "jackal/jackal_hunter.py",
              "    if not ARIA_BASELINE.exists():",
              "    if not _aria_baseline_exists():",
              "Bug5: ARIA_BASELINE.exists() → _aria_baseline_exists()"
          )

          # ────────────────────────────────────────────────────────
          # Bug 7: aria_main.py — kis_connected 하드코딩
          # ────────────────────────────────────────────────────────
          patch(
              "aria_main.py",
              "    import re\n    kis_connected = False\n    if kis_connected:\n        return report",
              "    import re\n    kis_connected = os.environ.get(\"KIS_CONNECTED\", \"\").lower() == \"true\"\n    if kis_connected:\n        return report",
              "Bug7: kis_connected 환경변수화"
          )

          # ────────────────────────────────────────────────────────
          # Bug 9: aria_paths.py — 절대경로 + ensure_dirs
          # ────────────────────────────────────────────────────────
          patch(
              "aria_paths.py",
              'DATA_DIR    = Path("data")       # 상태 JSON 저장소\nREPORTS_DIR = Path("reports")   # 일별 리포트 (분석 아카이브)\n\nDATA_DIR.mkdir(exist_ok=True)\nREPORTS_DIR.mkdir(exist_ok=True)',
              '''_REPO_ROOT  = Path(__file__).parent   # repo root 절대경로
DATA_DIR    = _REPO_ROOT / "data"
REPORTS_DIR = _REPO_ROOT / "reports"


def ensure_dirs() -> None:
    """data/, reports/ 디렉토리 보장 — import 사이드이펙트 제거"""
    DATA_DIR.mkdir(exist_ok=True)
    REPORTS_DIR.mkdir(exist_ok=True)


ensure_dirs()   # 기존 동작 유지 (import 시 자동 생성)''',
              "Bug9: 상대경로 → 절대경로 + ensure_dirs 함수화"
          )

          # Bug 9: aria_main.py에 ensure_dirs import 추가
          patch(
              "aria_main.py",
              "from aria_paths import MEMORY_FILE, REPORTS_DIR",
              "from aria_paths import MEMORY_FILE, REPORTS_DIR, ensure_dirs\nensure_dirs()",
              "Bug9: aria_main.py ensure_dirs() 호출"
          )

          # ────────────────────────────────────────────────────────
          # Bug 10: aria_analysis.py — MODEL 환경변수화
          # ────────────────────────────────────────────────────────
          patch(
              "aria_analysis.py",
              'MODEL   = "claude-sonnet-4-6"',
              'MODEL   = os.environ.get("ARIA_MODEL", "claude-sonnet-4-6")',
              "Bug10: aria_analysis.py MODEL 환경변수화"
          )

          # Bug 10: aria_agents.py — 모델 5개 환경변수화
          patch(
              "aria_agents.py",
              '''MODEL_HUNTER        = "claude-haiku-4-5-20251001"
MODEL_ANALYST       = "claude-sonnet-4-6"
MODEL_DEVIL         = "claude-sonnet-4-6"
MODEL_REPORTER_FULL = "claude-sonnet-4-6"
MODEL_REPORTER_LITE = "claude-sonnet-4-6"''',
              '''_DEFAULT_HAIKU  = "claude-haiku-4-5-20251001"
_DEFAULT_SONNET = "claude-sonnet-4-6"
MODEL_HUNTER        = os.environ.get("ARIA_MODEL_HUNTER", _DEFAULT_HAIKU)
MODEL_ANALYST       = os.environ.get("ARIA_MODEL",        _DEFAULT_SONNET)
MODEL_DEVIL         = os.environ.get("ARIA_MODEL",        _DEFAULT_SONNET)
MODEL_REPORTER_FULL = os.environ.get("ARIA_MODEL",        _DEFAULT_SONNET)
MODEL_REPORTER_LITE = os.environ.get("ARIA_MODEL_LITE",   _DEFAULT_SONNET)''',
              "Bug10: aria_agents.py 모델 환경변수화"
          )

          # ────────────────────────────────────────────────────────
          # Bug 11: aria_analysis.py — verification 중복 방어
          # ────────────────────────────────────────────────────────
          patch(
              "aria_analysis.py",
              '    if accuracy.get("history") and accuracy["history"][-1].get("date") == today:\n        print("Already verified today"); return accuracy',
              '    force_verify = os.environ.get("ARIA_FORCE_VERIFY", "").lower() == "true"\n    already_done = any(h.get("date") == today for h in accuracy.get("history", []))\n    if already_done and not force_verify:\n        print(f"Already verified today ({today}) — set ARIA_FORCE_VERIFY=true to rerun")\n        return accuracy',
              "Bug11: verification 중복 방어 개선 (any + FORCE_VERIFY)"
          )

          # ────────────────────────────────────────────────────────
          # Bug 12: aria_agents.py — call_api 재귀 → 루프
          # ────────────────────────────────────────────────────────
          patch(
              "aria_agents.py",
              '''def call_api(system: str, user: str, use_search=False,
             model=MODEL_ANALYST, max_tokens=2000, _retry: int = 0) -> str:
    """Anthropic API 호출 — 500/529 서버 오류 시 1회 자동 재시도"""
    import anthropic as _ac, time as _t
    kwargs = dict(
        model=model, max_tokens=max_tokens,
        system=system,
        messages=[{"role": "user", "content": user}],
    )
    if use_search:
        kwargs["tools"] = [{"type": "web_search_20250305", "name": "web_search"}]

    full = ""; sc = 0
    try:
        with client.messages.stream(**kwargs) as s:
            for ev in s:
                t = getattr(ev, "type", "")
                if t == "content_block_start":
                    blk = getattr(ev, "content_block", None)
                    if blk and getattr(blk, "type", "") == "tool_use":
                        sc += 1
                        q = getattr(blk, "input", {}).get("query", "")
                        console.print("    [dim]Search [" + str(sc) + "]: " + q + "[/dim]")
                elif t == "content_block_delta":
                    d = getattr(ev, "delta", None)
                    if d and getattr(d, "type", "") == "text_delta":
                        full += d.text
    except _ac.InternalServerError:
        if _retry < 1:
            console.print("  [yellow]⚠️ Anthropic 500 — 20초 후 재시도[/yellow]")
            _t.sleep(20)
            return call_api(system, user, use_search, model, max_tokens, _retry=1)
        raise
    except _ac.RateLimitError:
        if _retry < 1:
            console.print("  [yellow]⚠️ Rate limit — 60초 후 재시도[/yellow]")
            _t.sleep(60)
            return call_api(system, user, use_search, model, max_tokens, _retry=1)
        raise
    return full''',
              '''def call_api(system: str, user: str, use_search: bool = False,
             model: str = MODEL_ANALYST, max_tokens: int = 2000,
             max_retries: int = 2) -> str:
    """Anthropic API 호출 — 재귀 없는 루프 방식 재시도"""
    import anthropic as _ac
    import time as _t
    kwargs = dict(
        model=model, max_tokens=max_tokens,
        system=system,
        messages=[{"role": "user", "content": user}],
    )
    if use_search:
        kwargs["tools"] = [{"type": "web_search_20250305", "name": "web_search"}]
    _DELAYS = {_ac.InternalServerError: 20, _ac.RateLimitError: 60}
    last_exc = None
    for attempt in range(max_retries):
        full = ""; sc = 0
        try:
            with client.messages.stream(**kwargs) as s:
                for ev in s:
                    t = getattr(ev, "type", "")
                    if t == "content_block_start":
                        blk = getattr(ev, "content_block", None)
                        if blk and getattr(blk, "type", "") == "tool_use":
                            sc += 1
                            q = getattr(blk, "input", {}).get("query", "")
                            console.print("    [dim]Search [" + str(sc) + "]: " + q + "[/dim]")
                    elif t == "content_block_delta":
                        d = getattr(ev, "delta", None)
                        if d and getattr(d, "type", "") == "text_delta":
                            full += d.text
            return full
        except tuple(_DELAYS.keys()) as e:
            last_exc = e
            delay = _DELAYS.get(type(e), 30)
            if attempt < max_retries - 1:
                console.print(f"  [yellow]⚠️ {type(e).__name__} — {delay}s 후 재시도 ({attempt+1}/{max_retries-1})[/yellow]")
                _t.sleep(delay)
    raise last_exc''',
              "Bug12: call_api 재귀 → 루프"
          )

          # ────────────────────────────────────────────────────────
          # Bug 15: aria_backtest.py — 중복 import
          # ────────────────────────────────────────────────────────
          patch(
              "aria_backtest.py",
              "        import sys, os\n        sys.path.insert(0, os.getcwd())\n        import sys, os; sys.path.insert(0, os.getcwd()); from aria_analysis import update_weights_from_accuracy",
              "        from aria_analysis import update_weights_from_accuracy",
              "Bug15: 중복 import 제거"
          )

          print("\n" + "="*60)
          print("  모든 패치 적용 완료")
          print("="*60 + "\n")
          PYEOF

      - name: Verify fixes
        run: |
          python - << 'PYEOF'
          import re, sys
          from pathlib import Path

          errors = []

          def read(p):
              f = Path(p)
              if not f.exists():
                  errors.append(f"파일 없음: {p}"); return ""
              return f.read_text(encoding="utf-8")

          src = read("jackal/jackal_evolution.py")
          if src:
              m = re.search(r'"signal_weights"\s*:\s*\{([^}]+)\}', src, re.DOTALL)
              if m:
                  keys = re.findall(r'"(\w+)"\s*:', m.group(1))
                  dupes = {k for k in keys if keys.count(k) > 1}
                  if dupes: errors.append(f'Bug1: 중복 키 잔존: {dupes}')
              if "claude-sonnet-4-20250514" in src: errors.append('Bug1: 잘못된 모델명 잔존')
              if '".last_evolve").write_text' in src: errors.append('Bug8: .last_evolve 쓰기 잔존')

          src = read("jackal/jackal_core.py")
          if src:
              if "import json" not in src: errors.append('Bug3: import json 없음')
              if ".last_evolve" in src and "last_evolved_at" not in src: errors.append('Bug3: .last_evolve 의존 잔존')

          src = read("jackal/aria_adapter.py")
          if src and "_BASE.parent if (_BASE" in src: errors.append('Bug4: 경로 분기 잔존')

          src = read("jackal/jackal_hunter.py")
          if src:
              if 'ARIA_BASELINE  = Path("data")' in src: errors.append('Bug5: 하드코딩 잔존')
              if "from aria_adapter import" not in src: errors.append('Bug5: adapter import 없음')

          src = read("aria_main.py")
          if src and "kis_connected = False" in src: errors.append('Bug7: kis_connected 잔존')

          src = read("aria_paths.py")
          if src:
              if 'Path("data")' in src: errors.append('Bug9: 상대경로 잔존')
              if "ensure_dirs" not in src: errors.append('Bug9: ensure_dirs 없음')

          src = read("aria_analysis.py")
          if src:
              if 'MODEL   = "claude-sonnet-4-6"' in src: errors.append('Bug10: MODEL 하드코딩 잔존')
              if 'accuracy["history"][-1]' in src: errors.append('Bug11: [-1] 인덱스 잔존')
              if "ARIA_FORCE_VERIFY" not in src: errors.append('Bug11: FORCE_VERIFY 없음')

          src = read("aria_agents.py")
          if src:
              if 'MODEL_ANALYST       = "claude-sonnet-4-6"' in src: errors.append('Bug10: 모델 하드코딩 잔존')
              if "return call_api(" in src: errors.append('Bug12: call_api 재귀 잔존')
              if "max_retries" not in src: errors.append('Bug12: 루프 없음')

          src = read("aria_backtest.py")
          if src and "import sys, os; sys.path.insert" in src: errors.append('Bug15: 중복 import 잔존')

          print("\n" + "="*60)
          print("  검증 결과")
          print("="*60)
          if errors:
              print(f"❌ 미수정 {len(errors)}건:")
              for e in errors: print(f"   • {e}")
          else:
              print("✅ 모든 버그 수정 완료!")
          print("="*60 + "\n")
          sys.exit(1 if errors else 0)
          PYEOF

      - name: Commit fixes
        if: success()
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"

          git add aria_paths.py
          git add aria_analysis.py
          git add aria_agents.py
          git add aria_main.py
          git add aria_backtest.py
          git add jackal/jackal_evolution.py
          git add jackal/jackal_core.py
          git add jackal/aria_adapter.py
          git add jackal/jackal_hunter.py

          git diff --cached --quiet || \
            git commit -m "🔧 Fix: 전체 버그 수정 적용 (Bug1~15) [skip ci]"
          git push
