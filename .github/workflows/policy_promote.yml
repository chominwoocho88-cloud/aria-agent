name: Policy Promote

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Optional artifact name containing the latest policy-eval reports.
        required: false
        type: string
        default: ""
    outputs:
      decision:
        description: Final promotion decision.
        value: ${{ jobs.promote.outputs.decision }}
      artifact_name:
        description: Uploaded artifact name containing promotion reports.
        value: ${{ jobs.promote.outputs.artifact_name }}
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Optional artifact name containing the latest policy-eval reports.
        required: false
        type: string
        default: ""

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      decision: ${{ steps.capture.outputs.decision }}
      artifact_name: ${{ steps.capture.outputs.artifact_name }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download policy-eval artifact
        if: ${{ inputs.artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .

      - name: Build policy promotion decision
        env:
          PYTHONIOENCODING: utf-8
        run: python -m orca.policy_promote

      - name: Capture promotion outputs
        id: capture
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          decision = json.loads(Path("reports/orca_policy_promotion.json").read_text(encoding="utf-8"))
          artifact_name = f"policy-promote-{os.environ['GITHUB_RUN_ID']}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"decision={decision.get('decision', 'hold_manual_review')}\n")
              fh.write(f"artifact_name={artifact_name}\n")
          PY

      - name: Upload promotion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-promote-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            reports/orca_policy_promotion.md
            reports/orca_policy_promotion.json
