name: ORCA Backtest

concurrency:
  group: orca-research-backtest
  cancel-in-progress: false

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 opt-in (deprecation 경고 해결)
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install anthropic rich httpx yfinance pandas

      - name: Run ORCA Backtest
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python -m orca.backtest --months 6 --walk-forward

      - name: Run JACKAL Backtest
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python -m jackal.backtest

      - name: Upload research state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-state-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            data/orca_state.db
            data/orca_state.db-shm
            data/orca_state.db-wal

  policy-eval:
    needs: run-backtest
    uses: ./.github/workflows/policy_eval.yml
    with:
      artifact_name: research-state-${{ github.run_id }}
      strict: false

  policy-promote:
    if: ${{ needs.policy-eval.result == 'success' }}
    needs: policy-eval
    uses: ./.github/workflows/policy_promote.yml
    with:
      artifact_name: ${{ needs.policy-eval.outputs.artifact_name }}
