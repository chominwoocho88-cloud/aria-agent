name: JACKAL Session

# Session-oriented JACKAL workflow
# - Full session: Hunter -> Scanner -> Save state
# - Keeps discovery and timing logic separate in code, but runs them as one user-visible session.
# - Manual Scanner workflow remains available for debugging / ad-hoc rescans only.

concurrency:
  group: orca-repo-state
  cancel-in-progress: false
on:
  schedule:
    # Korean session
    - cron: "35 0 * * 1-5"    # KST 09:35  full session (Hunter -> Scanner)
    - cron: "30 4 * * 1-5"    # KST 13:30  scanner refresh
    # US session
    - cron: "35 14 * * 1-5"   # KST 23:35  full session (Hunter -> Scanner)
    - cron: "30 18 * * 1-5"   # KST 03:30  scanner refresh (next KST day)

  workflow_dispatch:
    inputs:
      session_mode:
        description: "full / scanner_only"
        required: false
        default: "full"
      force_hunt:
        description: "시장 상태와 무관하게 Hunter 강제 실행"
        required: false
        default: "false"
      force_scan:
        description: "시장 상태와 무관하게 Scanner 강제 실행"
        required: false
        default: "false"
      force_evolve:
        description: "Evolution 강제 실행 (true 입력 시 24h 미경과해도 학습 즉시 실행)"
        required: false
        default: "false"

jobs:
  jackal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # [Fix] Node.js 20 deprecation 대응 (2026-06-02 강제 전환)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # [Bug Fix] jackal_hunter imports pandas via jackal_core, so include it in CI.
        # Keep anthropic pinned to the version already used elsewhere in the repo.
        run: pip install anthropic==0.94.0 httpx yfinance==0.2.55 pandas

      - name: Run JACKAL Hunter
        if: >
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.session_mode != 'scanner_only'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-6"        # [Fix] ARIA와 동일 모델로 통일
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          JACKAL_DAILY_BUDGET: "500000"
          JACKAL_AUTOCOMPACT:  "true"
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY:         ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY:          ${{ secrets.FSCAPI_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_hunt }}"   = "true" ] && ARGS="$ARGS --force-hunt"
          [ "${{ github.event.inputs.force_evolve }}" = "true" ] && ARGS="$ARGS --force-evolve"
          python -m jackal.core $ARGS

      - name: Run JACKAL Scanner
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUBAGENT_MODEL: "claude-haiku-4-5-20251001"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_scan }}" = "true" ] && ARGS="$ARGS --force"
          python -m jackal.scanner $ARGS

      - name: Save JACKAL session state
        run: |
          git config user.name  "JACKAL Session"
          git config user.email "jackal-session@orca-agent"

          python - <<'PY'
          import sqlite3
          from pathlib import Path
          db = Path("data/orca_state.db")
          if db.exists():
              conn = sqlite3.connect(db)
              conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
              conn.close()
          PY

          git add jackal/hunt_log.json          2>/dev/null || true
          git add jackal/hunt_cooldown.json     2>/dev/null || true
          git add jackal/jackal_weights.json    2>/dev/null || true
          git add jackal/skills/                2>/dev/null || true
          git add jackal/lessons/               2>/dev/null || true
          git add jackal/compact_log.json       2>/dev/null || true
          git add jackal/scan_log.json          2>/dev/null || true
          git add jackal/scan_cooldown.json     2>/dev/null || true
          git add jackal/recommendation_log.json 2>/dev/null || true
          git add data/jackal_watchlist.json    2>/dev/null || true
          git add data/jackal_news.json         2>/dev/null || true
          git add -f data/orca_state.db         2>/dev/null || true

          git diff --cached --quiet && exit 0

          git commit -m "🦊 JACKAL Session: $(date +'%Y-%m-%d %H:%M') [skip ci]"

          git push || {
            git pull --rebase origin main || git rebase --abort
            git push
          }
