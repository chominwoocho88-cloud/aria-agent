name: ARIA Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic rich httpx

      - name: Run Backtest
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python aria_backtest.py

      - name: Save learning data
        run: |
          git config user.name "ARIA Bot"
          git config user.email "aria@github-actions"
          git fetch origin main
          git add data/ || true
          git diff --staged --quiet || git commit -m "ARIA: Backtest 학습 데이터 저장 (29거래일)"
          git push || (git pull --rebase origin main && git push)
