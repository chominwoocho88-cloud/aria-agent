name: ARIA Daily Report

# 하루 2회 리포트 + 주간/월간
on:
  schedule:
    - cron: "30 22 * * 0-4"   # MORNING  07:30 KST
    - cron: "0  12 * * 1-5"   # EVENING  21:00 KST
    - cron: "0  23 * * 6"     # WEEKLY   일요일 08:00 KST
    - cron: "0  22 1 * *"     # MONTHLY  매월 1일 07:00 KST

  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (MORNING / EVENING / WEEKLY / MONTHLY)"
        required: false
        default: "MORNING"

jobs:

  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── MORNING 07:30 KST ─────────────────────────────────────
      - name: MORNING Report
        if: >
          github.event.schedule == '30 22 * * 0-4' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'MORNING')
        env:
          PYTHONIOENCODING:    utf-8
          ARIA_MODE:           MORNING
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          GH_REPO:             ${{ secrets.GH_REPO }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          MAX_THINKING_TOKENS: "8000"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
        run: python aria_main.py

      # ── EVENING 21:00 KST ─────────────────────────────────────
      - name: EVENING Report
        if: >
          github.event.schedule == '0 12 * * 1-5' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'EVENING')
        env:
          PYTHONIOENCODING:    utf-8
          ARIA_MODE:           EVENING
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          GH_REPO:             ${{ secrets.GH_REPO }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          MAX_THINKING_TOKENS: "8000"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
        run: python aria_main.py

      # ── WEEKLY 일요일 08:00 KST ───────────────────────────────
      - name: WEEKLY Report
        if: >
          github.event.schedule == '0 23 * * 6' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'WEEKLY')
        env:
          PYTHONIOENCODING:  utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          from aria_notify import send_weekly_report
          send_weekly_report()
          "

      # ── MONTHLY 매월 1일 07:00 KST ────────────────────────────
      - name: MONTHLY Report
        if: >
          github.event.schedule == '0 22 1 * *' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'MONTHLY')
        env:
          PYTHONIOENCODING:  utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from aria_notify import send_monthly_report
          from aria_analysis import extract_monthly_lessons
          send_monthly_report()
          memory   = json.loads(Path('memory.json').read_text()) if Path('memory.json').exists() else []
          accuracy = json.loads(Path('accuracy.json').read_text()) if Path('accuracy.json').exists() else {}
          extract_monthly_lessons(memory, accuracy)
          "

      # ── 저장 ──────────────────────────────────────────────────
      - name: Save ARIA state
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"

          git add memory.json reports/ sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json || true

          git stash

          git fetch origin main
          git reset --hard origin/main

          git stash pop || true

          git add memory.json reports/ sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json || true

          git diff --staged --quiet || \
            git commit -m "ARIA: $(date +'%Y-%m-%d %H:%M') [${ARIA_MODE:-AUTO}] 저장"
          git push

  # ── Jackal (ARIA 완료 후, MORNING 때만) ───────────────────────
  run-jackal:
    needs: run-aria
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic httpx yfinance

      - name: Run Jackal
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          JACKAL_DAILY_BUDGET: "500000"
          JACKAL_AUTOCOMPACT:  "true"
        run: python jackal/jackal_core.py

      - name: Save Jackal state
        run: |
          git config user.name  "Jackal Bot"
          git config user.email "jackal@aria-agent"

          git add jackal/scan_log.json jackal/scan_cooldown.json \
                  jackal/jackal_weights.json jackal/skills/ \
                  jackal/lessons/ || true
          git add jackal/compact_log.json jackal/.last_evolve 2>/dev/null || true

          git stash
          git fetch origin main
          git reset --hard origin/main
          git stash pop || true

          git add jackal/scan_log.json jackal/scan_cooldown.json \
                  jackal/jackal_weights.json jackal/skills/ \
                  jackal/lessons/ || true
          git add jackal/compact_log.json jackal/.last_evolve 2>/dev/null || true

          git diff --cached --quiet || \
            git commit -m "🦊 Jackal: $(date +'%Y-%m-%d %H:%M') [skip ci]"
          git push || (git pull --rebase origin main && git push)
