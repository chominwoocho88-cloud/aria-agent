name: ARIA Daily Report

# ARIA 전용 워크플로우 — Jackal과 완전 독립
# 역할: 시장 분석 리포트 + 텔레그램 + dashboard.html
on:
  schedule:
    - cron: "30 23 * * 0-4"   # MORNING  08:30 KST (한국장 30분 전)
    - cron: "0  14 * * 1-5"   # EVENING  23:00 KST (미국장 30분 전)
    - cron: "0  22 * * 0"     # WEEKLY   일요일 07:00 KST
    - cron: "0  21 1 * *"     # MONTHLY  매월 1일 06:00 KST

  workflow_dispatch:
    inputs:
      mode:
        description: "MORNING / EVENING / WEEKLY / MONTHLY"
        required: false
        default: "MORNING"

jobs:
  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── MORNING 08:30 KST ─────────────────────────────────────
      - name: MORNING Report
        if: >
          github.event.schedule == '30 23 * * 0-4' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'MORNING')
        env:
          PYTHONIOENCODING:    utf-8
          ARIA_MODE:           MORNING
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          GH_REPO:             ${{ secrets.GH_REPO }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          MAX_THINKING_TOKENS: "8000"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
        run: python aria_main.py

      # ── EVENING 23:00 KST ─────────────────────────────────────
      - name: EVENING Report
        if: >
          github.event.schedule == '0 14 * * 1-5' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'EVENING')
        env:
          PYTHONIOENCODING:    utf-8
          ARIA_MODE:           EVENING
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          GH_REPO:             ${{ secrets.GH_REPO }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          MAX_THINKING_TOKENS: "8000"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
        run: python aria_main.py

      # ── WEEKLY 일요일 07:00 KST ───────────────────────────────
      - name: WEEKLY Report
        if: >
          github.event.schedule == '0 22 * * 0' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'WEEKLY')
        env:
          PYTHONIOENCODING:  utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          from aria_notify import send_weekly_report
          send_weekly_report()
          "

      # ── MONTHLY 매월 1일 06:00 KST ────────────────────────────
      - name: MONTHLY Report
        if: >
          github.event.schedule == '0 21 1 * *' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'MONTHLY')
        env:
          PYTHONIOENCODING:  utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from aria_notify import send_monthly_report
          from aria_analysis import extract_monthly_lessons
          send_monthly_report()
          mem = Path('memory.json') if Path('memory.json').exists() else Path('data/memory.json')
          acc = Path('accuracy.json') if Path('accuracy.json').exists() else Path('data/accuracy.json')
          memory   = json.loads(mem.read_text()) if mem.exists() else []
          accuracy = json.loads(acc.read_text()) if acc.exists() else {}
          extract_monthly_lessons(memory, accuracy)
          "

      # ── 저장 ──────────────────────────────────────────────────
      - name: Save ARIA state
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"

          # 루트 레벨 파일
          git add memory.json sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json \
                  reports/ dashboard.html 2>/dev/null || true
          # data/ 디렉토리 (aria_paths.py 기준)
          git add data/ 2>/dev/null || true

          git stash
          git fetch origin main
          git reset --hard origin/main
          git stash pop || true

          git add memory.json sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json \
                  reports/ dashboard.html 2>/dev/null || true
          git add data/ 2>/dev/null || true

          git diff --staged --quiet || \
            git commit -m "ARIA: $(date +'%Y-%m-%d %H:%M') [${ARIA_MODE:-AUTO}] 저장"
          git push
