name: ARIA Daily Report

# ARIA 전용 워크플로우 — Jackal과 완전 독립
# 역할: 시장 분석 리포트 + 텔레그램 + dashboard.html
on:
  schedule:
    - cron: "30 23 * * 0-4"   # MORNING  08:30 KST (한국장 30분 전)
    - cron: "0  14 * * 1-5"   # EVENING  23:00 KST (미국장 30분 전)
    - cron: "0  22 * * 6"     # WEEKLY   일요일 07:00 KST (UTC 토요일 22:00)
    - cron: "0  21 1 * *"     # MONTHLY  매월 1일 06:00 KST

  workflow_dispatch:
    inputs:
      mode:
        description: "MORNING / EVENING / WEEKLY / MONTHLY"
        required: false
        default: "MORNING"

jobs:
  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── MORNING 08:30 KST ─────────────────────────────────────
      - name: MORNING Report
        if: >
          github.event.schedule == '30 23 * * 0-4' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.mode == 'MORNING' || github.event.inputs.mode == ''))
        env:
          PYTHONIOENCODING:    utf-8
          ARIA_MODE:           MORNING
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          GH_REPO:             ${{ secrets.GH_REPO }}
          ARIA_MODEL:          "claude-sonnet-4-6"
          ANTHROPIC_MODEL:     "claude-sonnet-4-6"
          MAX_THINKING_TOKENS: "8000"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY:         ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY:          ${{ secrets.FSCAPI_KEY }}
        run: python aria_main.py

      # ── EVENING 23:00 KST ─────────────────────────────────────
      - name: EVENING Report
        if: >
          github.event.schedule == '0 14 * * 1-5' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'EVENING')
        env:
          PYTHONIOENCODING:    utf-8
          ARIA_MODE:           EVENING
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          GH_REPO:             ${{ secrets.GH_REPO }}
          ARIA_MODEL:          "claude-sonnet-4-6"
          ANTHROPIC_MODEL:     "claude-sonnet-4-6"
          MAX_THINKING_TOKENS: "8000"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY:         ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY:          ${{ secrets.FSCAPI_KEY }}
        run: python aria_main.py

      # ── WEEKLY 일요일 07:00 KST ───────────────────────────────
      - name: WEEKLY Report
        if: >
          github.event.schedule == '0 22 * * 6' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'WEEKLY')
        env:
          PYTHONIOENCODING:  utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          from aria_notify import send_weekly_report
          send_weekly_report()
          "

      # ── MONTHLY 매월 1일 06:00 KST ────────────────────────────
      - name: MONTHLY Report
        if: >
          github.event.schedule == '0 21 1 * *' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.mode == 'MONTHLY')
        env:
          PYTHONIOENCODING:  utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import json
          from aria_notify import send_monthly_report
          from aria_analysis import extract_monthly_lessons
          from aria_paths import MEMORY_FILE, ACCURACY_FILE
          send_monthly_report()
          memory   = json.loads(MEMORY_FILE.read_text(encoding='utf-8')) if MEMORY_FILE.exists() else []
          accuracy = json.loads(ACCURACY_FILE.read_text(encoding='utf-8')) if ACCURACY_FILE.exists() else {}
          extract_monthly_lessons(memory, accuracy)
          "

      # ── 경로 동기화 ────────────────────────────────────────────
      # data/ 기준 저장 파일을 루트로 복사 (일부 코드가 루트 경로 참조 시 대비)
      - name: Sync paths
        run: python sync_legacy_paths.py --direction data_to_root

      # ── 저장 ──────────────────────────────────────────────────
      - name: Save ARIA state
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"

          git add data/          2>/dev/null || true   # memory_archive.json 포함
          git add reports/       2>/dev/null || true
          git add dashboard.html 2>/dev/null || true

          git diff --cached --quiet && exit 0

          git commit -m "ARIA: $(date +'%Y-%m-%d %H:%M') [${ARIA_MODE:-AUTO}] 저장"

          # push — 충돌 시 rebase 후 재시도 (stash/reset --hard 제거)
          git push || {
            git pull --rebase origin main || git rebase --abort
            git push
          }
