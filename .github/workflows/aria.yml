## 🟡 개선하면 좋을 것들

**5. 예측 검증 로직이 첫 실행에서 동작 안 함**
`=== Verifying yesterday predictions ===` 이후 `No previous analysis`가 출력됩니다.  이전 데이터가 없을 때를 graceful하게 처리하고 있지만, 예측 정확도 누적 추적이 이번 회차에서는 완전히 스킵되었습니다. 최소한 "첫 실행" 상태임을 로그에 명시하고, 첫 데이터 기록 여부를 확인하는 로직을 추가하면 좋습니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt)

**6. 의존성 매번 재설치**
매 실행마다 `pip install anthropic rich httpx`를 새로 설치합니다.  GitHub Actions의 `cache` 기능(`actions/cache`)을 사용하면 설치 시간(현재 약 4초)을 절약하고 네트워크 비용도 줄일 수 있습니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/a4279242-74bd-4f51-8178-f19cc9f5e59d/4_Install-dependencies-9.txt)

**7. 비용 추적이 단순함**
`이번달 1회 실행 | 추정 $1.2 (약 1,776원)`처럼 추정치만 출력됩니다.  [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt) Anthropic API의 실제 토큰 사용량을 response 객체에서 직접 파싱해 `aria_cost.json`에 정확한 누적 비용을 기록하면 월 예산 관리가 훨씬 정확해집니다.

**8. Sentiment Score 불일치**
공포탐욕 지수 계산 결과가 Volatility 섹션에서는 `49 (Neutral)`이지만, Sentiment Tracking에서는 `Score: 40 / 공포`로 다르게 표시됩니다.  두 계산 방식이 서로 다른 로직을 사용하는 것으로 보이며, 단일 소스로 통일할 필요가 있습니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt)

**9. 저장 파일 목록에 `portfolio.json` 포함**
`git add portfolio.json`으로 저장을 시도하지만, 포트폴리오 파일이 항상 존항상 존재하는지 확인 로직이 없습니다. `2>/dev/null || true` 처리가 되어 있어 에러는 안 나지만, 해당 파일이 실제로 생성되고 있는지 로그에서 확인이 안 됩니다.

