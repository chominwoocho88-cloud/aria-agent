name: ARIA Daily Report

on:
  schedule:
    - cron: '30 19 * * 0-4'   # 04:30 KST DAWN
    - cron: '30 22 * * 0-4'   # 07:30 KST MORNING
    - cron: '30 5  * * 1-5'   # 14:30 KST AFTERNOON
    - cron: '30 11 * * 1-5'   # 20:30 KST EVENING
    - cron: '0  22 * * 0'     # 일요일 07:00 KST 주간
    - cron: '0  21 1 * *'     # 매월 1일 06:00 KST 월간
  workflow_dispatch:

jobs:

  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install anthropic rich httpx yfinance requests
          python -c "import rich; print('rich OK:', rich.__version__)"

      - name: Run ARIA DAWN
        if: github.event.schedule == '30 19 * * 0-4'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         DAWN
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      - name: Run ARIA MORNING
        if: >
          github.event.schedule == '30 22 * * 0-4' ||
          github.event_name == 'workflow_dispatch'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         MORNING
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      - name: Run ARIA AFTERNOON
        if: github.event.schedule == '30 5 * * 1-5'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         AFTERNOON
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      - name: Run ARIA EVENING
        if: github.event.schedule == '30 11 * * 1-5'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         EVENING
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      - name: Run ARIA Weekly
        if: github.event.schedule == '0 22 * * 0'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          from aria_notify import send_weekly_report
          send_weekly_report()
          "

      - name: Run ARIA Monthly
        if: github.event.schedule == '0 21 1 * *'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from aria_notify import send_monthly_report
          from aria_analysis import extract_monthly_lessons
          send_monthly_report()
          memory   = json.loads(Path('memory.json').read_text(encoding='utf-8')) if Path('memory.json').exists() else []
          accuracy = json.loads(Path('accuracy.json').read_text(encoding='utf-8')) if Path('accuracy.json').exists() else {}
          extract_monthly_lessons(memory, accuracy)
          "

      - name: Save memory
        env:
          ARIA_MODE: ${{ env.ARIA_MODE }}
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"
          git add memory.json reports/ sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json || true
          git stash
          git fetch origin main
          git reset --hard origin/main
          git stash pop || true
          git add memory.json reports/ sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json || true
          git diff --staged --quiet || git commit -m "ARIA: $(date +'%Y-%m-%d %H:%M') [${ARIA_MODE:-AUTO}] 저장"
          git push

  run-jackal:
    needs: run-aria
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install anthropic rich httpx yfinance requests
          python -c "import rich; print('rich OK:', rich.__version__)"

      - name: Run Jackal
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-20250514"
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          JACKAL_AUTOCOMPACT:  "true"
          JACKAL_DAILY_BUDGET: "500000"
        run: python jackal/jackal_core.py

      - name: Commit Jackal artifacts
        run: |
          git config user.name  "Jackal Bot"
          git config user.email "jackal@aria-agent"
          git add jackal/skills/ jackal/lessons/ jackal/jackal_weights.json jackal/compact_log.json 2>/dev/null || true
          git stash
          git fetch origin main
          git reset --hard origin/main
          git stash pop || true
          git add jackal/skills/ jackal/lessons/ jackal/jackal_weights.json jackal/compact_log.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🦊 Jackal: $(date +'%Y-%m-%d %H:%M') 학습 완료 [skip ci]"
          git push
