name: ARIA Daily Report

on:
  schedule:
    - cron: '30 19 * * 0-4'   # 04:30 KST - 새벽 (DAWN)
    - cron: '30 22 * * 0-4'   # 07:30 KST - 아침 (MORNING)
    - cron: '30 5  * * 1-5'   # 14:30 KST - 오후 (AFTERNOON)
    - cron: '30 11 * * 1-5'   # 20:30 KST - 저녁 (EVENING)
    - cron: '0 22  * * 0'     # 일요일 07:00 KST - 주간 리포트
    - cron: '0 21  1 * *'     # 매월 1일 06:00 KST - 월간 리포트
    - cron: '*/30 0-6,14-21 * * 1-5'  # 장중만 - 한국(KST 09-16) + 미국(KST 23:30-06:00)
  workflow_dispatch:

jobs:
  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic rich httpx

      - name: Fix encoding
        run: |
          python3 << 'EOF'
          import os
          files = [
              'aria_main.py', 'aria_agents.py', 'aria_analysis.py',
              'aria_notify.py', 'aria_data.py',
          ]
          for f in files:
              if os.path.exists(f):
                  text = open(f, encoding='utf-8').read()
                  text = text.replace('\u201c', '"').replace('\u201d', '"')
                  text = text.replace('\u2018', "'").replace('\u2019', "'")
                  open(f, 'w', encoding='utf-8').write(text)
                  print('Fixed: ' + f)
          EOF

      # ── 변동성 체크 ─────────────────────────────────────────────────────────
      - name: Volatility Check
        if: github.event.schedule == '*/30 * * * *'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ARIA_MODE:         MORNING
        run: |
          python3 << 'EOF'
          import subprocess
          from aria_data import fetch_all_market_data
          from aria_notify import send_message
          data   = fetch_all_market_data()
          alert  = data.get("volatility_alert", {})
          level  = alert.get("level", "normal")
          alerts = alert.get("alerts", [])
          print("Volatility: " + level)
          if level == "critical":
              print("CRITICAL — 긴급 분석 실행")
              subprocess.run(["python", "aria_main.py"], check=True)
          elif level == "elevated":
              print("ELEVATED — 경보 전송")
              send_message(
                  "⚠️ <b>ARIA 변동성 경보</b>\n\n"
                  + "\n".join(["• " + a for a in alerts])
                  + "\n\n다음 정규 분석 시 반영됩니다."
              )
          else:
              print("Normal — 스킵")
          EOF

      # ── 주간 리포트 ─────────────────────────────────────────────────────────
      - name: Run Weekly + Calendar + Lessons
        if: github.event.schedule == '0 22 * * 0'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          from aria_notify   import send_weekly_report, send_calendar_report
          from aria_analysis import extract_weekly_lessons

          send_weekly_report()
          send_calendar_report()

          memory   = json.loads(Path('memory.json').read_text(encoding='utf-8')) if Path('memory.json').exists() else []
          accuracy = json.loads(Path('accuracy.json').read_text(encoding='utf-8')) if Path('accuracy.json').exists() else {}
          extract_weekly_lessons(memory, accuracy)
          EOF

      # ── 월간 리포트 ─────────────────────────────────────────────────────────
      - name: Run Monthly + Lessons
        if: github.event.schedule == '0 21 1 * *'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          from aria_notify   import send_monthly_report
          from aria_analysis import extract_monthly_lessons

          send_monthly_report()

          memory   = json.loads(Path('memory.json').read_text(encoding='utf-8')) if Path('memory.json').exists() else []
          accuracy = json.loads(Path('accuracy.json').read_text(encoding='utf-8')) if Path('accuracy.json').exists() else {}
          extract_monthly_lessons(memory, accuracy)
          EOF

      # ── DAWN ────────────────────────────────────────────────────────────────
      - name: Run ARIA DAWN
        if: github.event.schedule == '30 19 * * 0-4'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         DAWN
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      # ── MORNING ─────────────────────────────────────────────────────────────
      - name: Run ARIA MORNING
        if: >
          github.event.schedule == '30 22 * * 0-4' ||
          github.event_name == 'workflow_dispatch'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         MORNING
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      # ── AFTERNOON ───────────────────────────────────────────────────────────
      - name: Run ARIA AFTERNOON
        if: github.event.schedule == '30 5 * * 1-5'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         AFTERNOON
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      # ── EVENING ─────────────────────────────────────────────────────────────
      - name: Run ARIA EVENING
        if: github.event.schedule == '30 11 * * 1-5'
        env:
          PYTHONIOENCODING: utf-8
          ARIA_MODE:         EVENING
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_main.py

      # ── 저장 ────────────────────────────────────────────────────────────────
      - name: Save memory
        run: |
          git config user.name "ARIA Bot"
          git config user.email "aria@github-actions"
          git fetch origin main
          git reset --hard origin/main
          git add memory.json reports/ sentiment.json accuracy.json \
                  rotation.json aria_weights.json aria_lessons.json \
                  aria_cost.json aria_market_data.json morning_baseline.json || true
          git diff --staged --quiet || git commit -m "ARIA: $(date +'%Y-%m-%d %H:%M') [${ARIA_MODE:-AUTO}] 저장"
          git push
        env:
          ARIA_MODE: ${{ env.ARIA_MODE }}
