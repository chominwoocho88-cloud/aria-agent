## ARIA 주식 보고서 프로그램 분석

이 프로그램은 **GitHub Actions**에서 자동 실행되는 AI 주식 분석 시스템으로, `Hunter → Analyst → Devil → Reporter` 4단계 에이전트 파이프라인을 통해 아침마다 시장 보고서를 생성하고 텔레그램으로 전송하는 구조입니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt)

