name: ARIA Daily Report

on:
  schedule:
    - cron: '30 22 * * 0-4'
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic rich httpx

      - name: Fix encoding
        run: |
          python3 << 'EOF'
          import os
          files = [
              'aria_multi_agent.py',
              'aria_verifier.py',
              'aria_sentiment.py',
              'aria_portfolio.py',
              'aria_telegram.py',
              'aria_weekly.py'
          ]
          for f in files:
              if os.path.exists(f):
                  text = open(f, encoding='utf-8').read()
                  text = text.replace('\u201c', '"').replace('\u201d', '"')
                  text = text.replace('\u2018', "'").replace('\u2019', "'")
                  open(f, 'w', encoding='utf-8').write(text)
                  print('Fixed: ' + f)
          EOF

      - name: Run Weekly Report (Monday only)
        if: github.event.schedule == '0 22 * * 0'
        env:
          PYTHONIOENCODING: utf-8
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python aria_weekly.py

      - name: Run ARIA
        if: github.event.schedule != '0 22 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: python aria_multi_agent.py

      - name: Save memory
        run: |
          git config user.name "ARIA Bot"
          git config user.email "aria@github-actions"
          git stash
          git pull --rebase origin main
          git stash pop
          git add memory.json reports/ sentiment.json accuracy.json || true
          git diff --staged --quiet || git commit -m "ARIA: $(date +'%Y-%m-%d') 분석 저장"
          git push
