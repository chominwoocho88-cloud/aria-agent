name: ARIA Daily Report

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 매일 평일 오전 8시 KST 자동 실행
  workflow_dispatch:           # 버튼 눌렀을 때 즉시 실행

jobs:
  run-aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic rich httpx

      - name: Run ARIA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          GH_REPO:           ${{ secrets.GH_REPO }}
        run: python aria_multi_agent.py

      - name: Save memory
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"
          git add memory.json reports/ || true
          git diff --staged --quiet || git commit -m "ARIA: $(date +'%Y-%m-%d') 분석 저장"
          git push
