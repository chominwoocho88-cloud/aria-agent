## 🔴 버그 / 에러 (즉시 수정 필요)

**1. CNN Fear & Greed API 실패**
로그에서 `CNN 실패: Expecting value: line 1 column 1 (char 0)` 에러가 발생하고 있습니다.  CNN이 API 응답을 막거나 포맷을 변경한 것으로, 현재 VIX 기반으로 자체 계산 (49/Neutral)으로 대체 중입니다. 실제 CNN Fear & Greed 지수는 별도 대안 소스(예: `alternative.me` API)로 교체하면 됩니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt)

**2. VKOSPI 데이터 미제공**
보고서 Volatility 섹션에 `VKOSPI: 데이터 미제공`이 그대로 출력됩니다.  한국 변동성 지수를 가져오는 소스가 없거나 파싱이 실패하고 있습니다. KRX 또는 네이버금융 스크래핑으로 대체 가능합니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt)

**3. KIS API 미연결**
한국투자증권 API가 연결되지 않아 국내 증시 상세 데이터(외국인/기관 매매 등)를 못 가져오고 있습니다.  GitHub Actions Secrets에 KIS API 키가 없거나 토큰 갱신 로직이 빠진 것으로 추정됩니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/ed4144c5-d422-4e68-912f-b05044caa513/7_Run-ARIA-MORNING-10.txt)

**4. Node.js 20 Deprecation 경고**
`actions/checkout@v4.2.2`와 `actions/setup-python@v5.4.0`이 Node 20 기반으로 동작하지만, GitHub Actions 러너가 Node 24 강제 적용 중이라 경고가 발생합니다.  두 action 모두 최신 버전(`v4` 최신 마이너 버전)으로 업그레이드하면 해결됩니다. [ppl-ai-file-upload.s3.amazonaws](https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/158538079/89c6c217-c79f-432a-8133-79ac388dbd79/19_Complete-job-4.txt)

